<!DOCTYPE html>
<html>
<head>
    <title>Modifica nota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>✏️ Modifica nota</h2>

    <form method="post" action="/update_note/{{ note['id'] }}/{{ vehicle_id }}">

        <textarea class="form-control mb-3" name="content" rows="4" required>{{ note['content'] }}</textarea>

        <button class="btn btn-success w-100">💾 Salva modifiche</button>

    </form>

</div>

</body>
</html>
