<!DOCTYPE html>
<html>
<head>
    <title>Modifica manutenzione</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>✏️ Modifica manutenzione</h2>

    <form method="post" action="/update_maintenance/{{ maintenance['id'] }}/{{ vehicle_id }}">

        <input class="form-control mb-2" name="description" value="{{ maintenance['description'] }}" required>

        <input class="form-control mb-2" name="cost" value="{{ maintenance['cost'] }}">

        <input class="form-control mb-2" name="workshop" value="{{ maintenance['workshop'] }}">

        <input class="form-control mb-2" type="date" name="date" value="{{ maintenance['date'] }}" required>

        <button class="btn btn-success w-100">💾 Salva modifiche</button>

    </form>

</div>

</body>
</html>
